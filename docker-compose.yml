services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: reclamations-postgres
    environment:
      POSTGRES_DB: reclamations_db
      POSTGRES_USER: reclamations_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reclamations_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped

  # Redis for JWT blacklist and cache
  redis:
    image: redis:7-alpine
    container_name: reclamations-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Django Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reclamations-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost}
      DB_NAME: reclamations_db
      DB_USER: reclamations_user
      DB_PASSWORD: ${DB_PASSWORD:-reclamations_pass}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: reclamations-nginx
    volumes:
      - static_volume:/var/www/static
      - media_volume:/var/www/media
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist/browser:/var/www/web:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
