name: reclamations_mobile
description: "Application mobile ISCAE - Gestion des Réclamations (Étudiants)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.2

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^17.3.0

  # Secure storage for tokens
  flutter_secure_storage: ^10.3.1

  # Local caching (offline support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Date formatting
  intl: ^0.20.2

  # File picking for attachments
  file_picker: ^12.0.0-beta.7

  # Image display for attachments
  cached_network_image: ^3.4.1

  # Pull to refresh
  pull_to_refresh: ^2.0.0

  # Toast/snackbar
  fluttertoast: ^9.1.0

  # Connectivity
  connectivity_plus: ^7.3.0

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_intl:
  enabled: true
  class_name: S
  main_locale: fr
  arb_dir: lib/l10n
  output_dir: lib/generated

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-iscae.png"
  adaptive_icon_background: "#FFFFFF"
