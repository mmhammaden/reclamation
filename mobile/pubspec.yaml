name: reclamations_mobile
description: "Application mobile ISCAE - Gestion des Réclamations (Étudiants)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.8.1

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.4

  # Local caching (offline support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Date formatting
  intl: ^0.20.2

  # File picking for attachments
  file_picker: ^11.0.2

  # Image display for attachments
  cached_network_image: ^3.4.1

  # Pull to refresh
  pull_to_refresh: ^2.0.0

  # Toast/snackbar
  fluttertoast: ^8.2.10

  # Connectivity
  connectivity_plus: ^6.1.2

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_intl:
  enabled: true
  class_name: S
  main_locale: fr
  arb_dir: lib/l10n
  output_dir: lib/generated