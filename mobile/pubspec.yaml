name: reclamations_iscae
description: ISCAE Réclamations - Mobile Flutter App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.0

  # HTTP client
  dio: ^5.4.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.0.0

  # Push notifications
  firebase_messaging: ^14.7.10
  firebase_core: ^3.6.0

  # Navigation
  go_router: ^12.1.3

  # Immutable models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI utilities
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true